<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Birthday Surprise 💖</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; }
.title { font-family: 'Great Vibes', cursive; }

/* Balloons */
.balloon {
  position: fixed;
  bottom: -100px;
  font-size: 30px;
  animation: rise 8s linear infinite;
}
@keyframes rise {
  to { transform: translateY(-110vh); }
}

/* Confetti */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  animation: fall 3s linear;
}
@keyframes fall {
  to { transform: translateY(110vh); }
}
</style>
</head>

<body class="bg-gradient-to-br from-pink-500 via-purple-600 to-indigo-700 text-white overflow-hidden">

<audio id="music" loop>
  <source src="" type="audio/mpeg">
</audio>

<div id="app" class="w-full h-screen flex items-center justify-center">

<!-- Screen 1 -->
<div id="s1" class="text-center space-y-6">
  <h1 class="title text-5xl">Hey Sister 💖</h1>
  <p>I have something special for you</p>
  <button onclick="start()" class="bg-white text-pink-600 px-6 py-3 rounded-full hover:scale-110 transition">Start 🎁</button>
</div>

<!-- Screen 2 -->
<div id="s2" class="hidden text-center space-y-6">
  <h1 class="title text-4xl">Tap the Gift 🎁</h1>
  <div onclick="openGift()" class="text-8xl animate-bounce cursor-pointer">🎁</div>
</div>

<!-- Screen 3 -->
<div id="s3" class="hidden text-center space-y-4">
  <h1 class="title text-5xl">Happy Birthday 🎉</h1>
  <img src="photo1.jpg" class="w-64 mx-auto rounded-xl shadow-xl">
  <button onclick="next(4)" class="bg-white text-pink-600 px-6 py-2 rounded-full">Next</button>
</div>

<!-- Screen 4 -->
<div id="s4" class="hidden text-center space-y-4">
  <h1 class="title text-4xl">Message 💌</h1>
  <p id="text"></p>
  <button onclick="next(5)" class="bg-white text-pink-600 px-6 py-2 rounded-full">Final</button>
</div>

<!-- Screen 5 FINAL -->
<div id="s5" class="hidden text-center space-y-4">
  <h1 class="title text-5xl">Enjoy Your Day 🎂</h1>
  <img src="photo33.jpg" class="w-64 mx-auto rounded-xl shadow-xl">
  <p>Love you forever ❤️</p>

  <button onclick="celebrate()" class="bg-white text-pink-600 px-6 py-2 rounded-full">
    Celebrate 🎆
  </button>

  <!-- Cake GIF -->
  <div id="cakeBox" class="hidden mt-4">
    <img src="cake.gif" class="w-64 mx-auto rounded-xl shadow-lg">
    <p class="mt-2">Make a wish & cut the cake 🎂💖</p>
  </div>
</div>

</div>

<script>
function show(id) {
  document.querySelectorAll('#app > div').forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function start() {
  document.getElementById('music').play();
  show('s2');
}

function openGift() {
  show('s3');
}

function next(n) {
  show('s' + n);
  if(n === 4) typeText();
}

// Typing effect
let msg = "You are my best friend and my biggest support. I love you so much ❤️";
function typeText() {
  let i = 0;
  let el = document.getElementById('text');
  el.innerHTML = "";
  function t() {
    if (i < msg.length) {
      el.innerHTML += msg[i++];
      setTimeout(t, 40);
    }
  }
  t();
}

// Balloons
setInterval(() => {
  let b = document.createElement('div');
  b.className = 'balloon';
  b.innerHTML = '🎈';
  b.style.left = Math.random() * 100 + 'vw';
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 8000);
}, 700);

// Celebrate
function celebrate() {

  // Show cake GIF
  document.getElementById('cakeBox').classList.remove('hidden');

  // Confetti
  for (let i = 0; i < 120; i++) {
    let c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = ['red','yellow','blue','pink'][Math.floor(Math.random()*4)];
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
}
</script>

</body>
</html>
