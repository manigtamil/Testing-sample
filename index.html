<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ultimate Birthday Surprise 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0; font-family:'Poppins',sans-serif; color:#fff;
  background: linear-gradient(135deg,#1a0f1f,#2a1230);
  overflow:hidden;
}
.screen{display:none; height:100vh; align-items:center; justify-content:center; text-align:center}
.active{display:flex}
.card{
  width:90%; max-width:400px; padding:25px;
  border-radius:25px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  box-shadow:0 15px 40px rgba(0,0,0,.5);
}
.title{font-family:'Great Vibes',cursive; font-size:2.5rem}
.btn{
  margin-top:15px; padding:12px 25px;
  border:none; border-radius:30px;
  background: linear-gradient(135deg,#ff4d88,#ff7eb3);
  color:white; cursor:pointer;
}
img{width:100%; border-radius:15px; margin-top:10px}

/* Balloons */
.balloon{position:absolute; bottom:-100px; font-size:30px; animation:rise 8s linear infinite}
@keyframes rise{to{transform:translateY(-110vh)}}

/* Confetti */
.conf{position:fixed; width:10px; height:10px; animation:fall 3s linear}
@keyframes fall{to{transform:translateY(110vh)}}

/* Game box */
.gift{
  font-size:80px; cursor:pointer;
  animation: bounce 1s infinite;
}
@keyframes bounce{50%{transform:translateY(-10px)}}

</style>
</head>
<body>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Screen 1 -->
<div class="screen active" id="s1">
  <div class="card">
    <h1 class="title">Hey Sister 💖</h1>
    <p>I made something special for you</p>
    <button class="btn" onclick="start()">Start 🎁</button>
  </div>
</div>

<!-- Screen 2 (Mini Game) -->
<div class="screen" id="s2">
  <div class="card">
    <h1 class="title">Tap the Gift 🎁</h1>
    <div class="gift" onclick="openGift()">🎁</div>
    <p>Find your surprise 😄</p>
  </div>
</div>

<!-- Screen 3 -->
<div class="screen" id="s3">
  <div class="card">
    <h1 class="title">Happy Birthday 🎉</h1>
    <img src="photo1.jpg">
    <p>You are my happiness 💕</p>
    <button class="btn" onclick="next(4)">Next</button>
  </div>
</div>

<!-- Screen 4 Typing -->
<div class="screen" id="s4">
  <div class="card">
    <h1 class="title">Message 💌</h1>
    <p id="text"></p>
    <button class="btn" onclick="next(5)">Final</button>
  </div>
</div>

<!-- Screen 5 Final -->
<div class="screen" id="s5">
  <div class="card">
    <h1 class="title">🎂 Enjoy Your Day 🎂</h1>
    <img src="photo2.jpg">
    <p>Love you forever ❤️</p>
    <button class="btn" onclick="confetti()">Celebrate 🎆</button>
  </div>
</div>

<script>
function start(){
  document.getElementById('music').play();
  show(2);
}

function show(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
}

function next(n){ show(n); typeText(); }

function openGift(){ show(3); }

// Typing
let msg="You are my best friend and my biggest support. I love you so much ❤️";
let i=0;
function typeText(){
  let el=document.getElementById('text');
  el.innerHTML=""; i=0;
  function t(){ if(i<msg.length){ el.innerHTML+=msg[i++]; setTimeout(t,40);} }
  t();
}

// Balloons
setInterval(()=>{
  let b=document.createElement('div');
  b.className='balloon';
  b.innerHTML='🎈';
  b.style.left=Math.random()*100+'vw';
  document.body.appendChild(b);
  setTimeout(()=>b.remove(),8000);
},800);

// Confetti
function confetti(){
  for(let i=0;i<80;i++){
    let c=document.createElement('div');
    c.className='conf';
    c.style.left=Math.random()*100+'vw';
    c.style.background=['red','yellow','blue','pink'][Math.floor(Math.random()*4)];
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}
</script>

</body>
</html>
