<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sister 🎉</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  color: #333;
}
.container {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
button {
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  background: #ff4081;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  background: #e91e63;
}
.card {
  display: none;
  animation: fadeIn 1s ease-in-out;
}
img {
  width: 200px;
  border-radius: 15px;
  margin: 10px;
}
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);} 
  to {opacity: 1; transform: translateY(0);} 
}
</style>
</head>
<body>

<div class="container" id="page1">
  <h1>🎁 I have a surprise for you!</h1>
  <button onclick="nextPage()">Click Me ❤️</button>
</div>

<div class="container card" id="page2">
  <h1>🎉 Happy Birthday Sister! 🎉</h1>
  <p>You are the best sister in the world 💖</p>
  <img src="photo1.jpg" alt="memory">
  <button onclick="nextPage2()">Next Surprise 🎊</button>
</div>

<div class="container card" id="page3">
  <h1>💫 Special Message 💫</h1>
  <p>Thank you for always being there for me. I love you so much! 💕</p>
  <img src="photo2.jpg" alt="memory">
  <button onclick="nextPage3()">Final Surprise 🎂</button>
</div>

<div class="container card" id="page4">
  <h1>🎂 Enjoy Your Day 🎂</h1>
  <p>May all your dreams come true ✨</p>
  <img src="photo3.jpg" alt="memory">
</div>

<script>
function nextPage() {
  document.getElementById('page1').style.display = 'none';
  document.getElementById('page2').style.display = 'flex';
}
function nextPage2() {
  document.getElementById('page2').style.display = 'none';
  document.getElementById('page3').style.display = 'flex';
}
function nextPage3() {
  document.getElementById('page3').style.display = 'none';
  document.getElementById('page4').style.display = 'flex';
}
</script>

</body>
</html>
